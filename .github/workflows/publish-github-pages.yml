name: Publish to GitHub Pages

on:
  workflow_call:
    inputs:
      build_script:
        required: true
        type: string
      destination_dir:
        required: true
        type: string
      publish_dir:
        required: true
        type: string

jobs:
  publish-environment:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: write
    steps:
      - name: Ensure `build_script` is not empty
        if: ${{ inputs.destination_dir == '' }}
        run: exit 1
      - name: Ensure `destination_dir` is not empty
        if: ${{ inputs.destination_dir == '' }}
        run: exit 1
      - name: Ensure `publish_dir` is not empty
        if: ${{ inputs.publish_dir == '' }}
        run: exit 1
      - name: Get access token
        id: get-token
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          permissions: |
            contents: write
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: true
      - name: Run build script
        run: ${{ inputs.build_script }}
      - name: Deploy to `${{ inputs.destination_dir }}` directory of `gh-pages` branch
        uses: peaceiris/actions-gh-pages@de7ea6f8efb354206b205ef54722213d99067935
        with:
          personal_token: ${{ steps.get-token.outputs.token }}
          publish_dir: ${{ inputs.publish_dir }}
          destination_dir: ${{ inputs.destination_dir }}
